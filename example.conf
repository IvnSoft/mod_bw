# mod_bw v2 - sample Apache configuration
#
# Load the module (adjust path to match your Apache modules directory)
LoadModule bw_module /usr/lib64/httpd/modules/mod_bw.so

# --- Global SHM / mutex configuration -------------------------------
# These directives must appear at the global level (outside any
# VirtualHost) so they apply to the single shared-memory region.

# Path for the named SHM file.  Persists across graceful restarts.
BandWidthSHMFile  /var/run/httpd/mod_bw.shm

# Path for the APR global write-mutex.
BandWidthLockFile /var/run/httpd/mod_bw.lock

# Directory for per-day CSV statistics files.
BandWidthStatsDir /var/log/httpd/bandwidth

# Persisted store for API-managed tokens (JSON Lines, written mode 0600).
# MUST be writable by the WORKER user (it is saved from the request handler,
# not the root parent): e.g. `install -d -o apache -g apache /var/lib/mod_bw`.
# See docs/admin-tokens.md.
BandWidthTokenStore /var/lib/mod_bw/tokens.json

# Pre-allocated slot capacities.  Size the SHM at startup; no restart
# needed to use slots up to these limits.
BandWidthMaxVHosts 512
BandWidthMaxPools  4096
BandWidthMaxRules  8192
BandWidthMaxTokens 64


# --- Example VirtualHost: bandwidth-limited website ------------------
<VirtualHost *:80>
    ServerName  www.example.com
    DocumentRoot /var/www/html

    # Enable mod_bw for this vhost
    BandWidthModule on

    # Pool 1: catch-all output limit of 5 MB/s, max 200 simultaneous downloads
    # Syntax: BandWidthPool <pool_id> <where> <out_bytes/s> <maxconn>
    #          optional: parent:<id>  in:<in_bytes/s>  min:<min_bytes/s>
    BandWidthPool 1 all 5242880 200

    # Pool 2: give a 1 GB/s pass to the local network (no limit in practice)
    BandWidthPool 2 192.168.0.0/16 1073741824 0

    # Pool 3: throttle a specific bot User-Agent to 64 KB/s
    BandWidthPool 3 u:BadBot 65536 10

    # Pool 4: limit upload bandwidth to 512 KB/s for everybody
    BandWidthPool 4 all 0 0 in:524288

    # Return 503 when maxconn is exceeded (default is HTTP_SERVICE_UNAVAILABLE)
    BandWidthError 503

    # Packet size for the output filter (default 8192)
    BandWidthPacket 8192

    # Throttle enforcement mode (default: sleep).  See docs/throttling-modes.md
    #   sleep  - portable; the worker sleeps between packets. Exact, but ties
    #            up one worker per throttled connection (prefork exhaustion risk).
    #   pacing - Linux only; sets SO_MAX_PACING_RATE so the kernel paces egress.
    #            The worker writes and returns - no per-connection blocking.
    #   tc     - Linux only; stamps a DSCP class (pool id) on the socket for an
    #            external tc/HTB qdisc to shape. Non-blocking; needs qdisc setup.
    # See docs/throttling-modes.md for the full comparison table.
    #   sleep  - worker sleeps between packets (exact, blocks the worker).
    #   pacing - Linux SO_MAX_PACING_RATE (egress, non-blocking, no privilege).
    #   tc     - Linux DSCP mark for an external HTB qdisc (egress, no privilege).
    #   mark   - Linux SO_MARK fwmark for nftables/tc; works for BOTH directions
    #            but needs CAP_NET_ADMIN in the worker (Apache's privilege drop
    #            normally removes it - see the docs).
    #BandWidthThrottleMode pacing

    # Ingress (upload) enforcement (default: sleep).
    #   sleep - read-then-sleep in the worker (exact, blocks the worker).
    #   clamp - Linux; cap the TCP receive window. Non-blocking, coarse: rate~window/RTT.
    #   mark  - Linux SO_MARK for an external ingress shaper (tc/IFB/HTB).
    #BandWidthIngressMode clamp

    # fwmark base for 'mark' mode: socket mark = base + pool id (avoids
    # collisions with other fwmark users). Decimal, 0x-hex, or 0-octal.
    #BandWidthMarkBase 0x100

    # -- Per-request env override (composes with SetEnv/SetEnvIf/rewrite) --
    # Overrides the matched pool's value for THIS request only. Precedence:
    # env > rule > pool. Lets you vary rate/mode per request, or impose a
    # limit on an otherwise-unlimited pool. Vars: BW_RATE, BW_IN_RATE,
    # BW_MIN_RATE, BW_MODE, BW_INGRESS_MODE, BW_MARK.
    #SetEnvIf User-Agent "BadBot" BW_RATE=51200

    # -- Management API ------------------------------------------------
    # Enable the REST API on this vhost.
    #
    # IMPORTANT - operational notes:
    #   * Protect this with TLS and restrict source IPs in production.
    #   * The token check is constant-time but has NO built-in rate limiting;
    #     front the endpoint with a reverse proxy / fail2ban if it is exposed.
    #   * The API emits NO CORS headers by design. Serve the admin SPA from the
    #     SAME origin as the API (as the bundled admin vhost does), or place
    #     both behind one reverse-proxy origin. Browsers will block cross-origin
    #     calls otherwise - this is intentional, not a bug.
    BandWidthAPIEnabled on
    BandWidthAPIToken   "change-me-to-a-long-random-secret"
    BandWidthAPIPath    /_bw_api

    # Status page (legacy HTML, no auth - add your own <Location> block)
    <Location /bw-status>
        SetHandler mod-bw-status
    </Location>
</VirtualHost>


# --- Example VirtualHost: API-only management endpoint ---------------
# A dedicated vhost for the management API behind an internal listener.
<VirtualHost 127.0.0.1:8080>
    ServerName  bw-mgmt.internal

    BandWidthAPIEnabled on
    BandWidthAPIToken   "change-me-to-a-long-random-secret"
    BandWidthAPIPath    /

    # No bandwidth limits on the management interface itself
</VirtualHost>


# --- REST API quick reference -----------------------------------------
#
# All requests need:  Authorization: Bearer change-me-to-a-long-random-secret
#
# Module status:
#   GET  /_bw_api/status
#
# List all vhosts (with live metrics):
#   GET  /_bw_api/vhosts
#
# Add a vhost dynamically (no apache restart needed):
#   POST /_bw_api/vhosts
#   {"name":"newsite.example.com","enabled":true}
#
# Enable / disable a vhost:
#   PUT  /_bw_api/vhosts/:idx
#   {"enabled":false}
#
# Remove a vhost (drains active connections first):
#   DELETE /_bw_api/vhosts/:idx
#
# List pools for vhost 0:
#   GET  /_bw_api/vhosts/0/pools
#
# Add a pool:
#   POST /_bw_api/vhosts/0/pools
#   {"id":10,"bwlimit":1048576,"in_bwlimit":524288,"maxc":50,"parent_idx":4294967295}
#
# Update pool limits at runtime (no restart):
#   PUT  /_bw_api/vhosts/0/pools/:pidx
#   {"bwlimit":2097152,"in_bwlimit":0,"maxc":100}
#
# Add a rule to a pool:
#   POST /_bw_api/vhosts/0/pools/0/rules
#   {"type":"ip","value":"10.0.0.0/8","rate":0,"in_rate":0,"min_rate":0}
#
# Live metrics (JSON):
#   GET  /_bw_api/metrics
#   GET  /_bw_api/metrics/:vhost_idx
